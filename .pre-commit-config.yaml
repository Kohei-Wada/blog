---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: lint-staged
        name: Lint Staged Files
        entry: npx lint-staged
        language: system
        stages: [pre-commit]
        require_serial: true

      - id: typecheck
        name: TypeScript Type Check
        entry: npm run typecheck
        language: system
        stages: [pre-commit]
        pass_filenames: false

      - id: test
        name: Run Tests
        entry: npm run test:run
        language: system
        stages: [pre-commit]
        pass_filenames: false

      - id: build
        name: Build Check
        entry: npm run build
        language: system
        stages: [pre-commit]
        pass_filenames: false
